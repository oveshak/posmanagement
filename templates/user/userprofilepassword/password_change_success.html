<div class="p-4 sm:p-6">
    <div class="max-w-2xl mx-auto rounded-3xl border p-6 text-center"
         style="background:var(--surface); border-color:var(--border);">

        <div class="w-16 h-16 mx-auto rounded-2xl flex items-center justify-center mb-4"
             style="background:rgba(16,185,129,.12); color:#10b981;">
            <i class="fas fa-check text-2xl"></i>
        </div>

        <h3 class="text-xl font-bold mb-2" style="color:var(--text-main);">
            Password Updated
        </h3>

        <p class="text-sm mb-5" style="color:var(--text-muted);">
            {{ message }}
        </p>

        <a href="{% url 'profile_page' %}"
           hx-get="{% url 'profile_page' %}"
           hx-target="#main-content"
           hx-swap="innerHTML"
           hx-push-url="true"
           class="inline-flex items-center gap-2 px-5 py-2.5 rounded-2xl text-sm font-medium"
           style="background:var(--accent); color:white;">
            <i class="fas fa-user"></i>
            Back to Profile
        </a>
    </div>
</div>
