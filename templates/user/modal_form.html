<script>
// Helper functions for related modal handling
function buildModalParams(fieldName, modelName) {
    return {
        'parent_field': fieldName,
        'model': modelName
    };
}

function openEditRelatedFromField(fieldName, modelName) {
    const field = document.querySelector(`[name="${fieldName}"]`);
    if (!field || !field.value) {
        alert('Please select an item first');
        return;
    }
    const pk = field.value;
    openRelatedModal(modelName, 'edit', pk, {
        'parent_field': fieldName
    });
}

function closeModal() {
    const modal = document.getElementById('modal-container');
    if (modal) {
        modal.classList.add('hidden');
    }
}
</script>

<script>
// Additional helper functions for modal operations
function closeModal() {
    const modal = document.getElementById('modal-container');
    if (modal) {
        modal.classList.add('hidden');
    }
}

function removeFromM2M(fieldName, value) {
    const checkbox = document.querySelector(`input[name="${fieldName}"][value="${value}"]`);
    if (checkbox) {
        checkbox.checked = false;
    }
}

// Initialize select2 for enhanced selects if available
document.addEventListener('DOMContentLoaded', function() {
    const selects = document.querySelectorAll('.js-enhanced-select');
    selects.forEach(function(select) {
        if (typeof $ !== 'undefined' && $.fn.select2) {
            $(select).select2({
                theme: 'bootstrap-5',
                width: '100%'
            });
        }
    });

    const multiselects = document.querySelectorAll('.js-enhanced-multiselect');
    multiselects.forEach(function(select) {
        if (typeof $ !== 'undefined' && $.fn.select2) {
            $(select).select2({
                theme: 'bootstrap-5',
                width: '100%',
                multiple: true
            });
        }
    });
});

function openRelatedModal(modelName, action, pk = null, params = {}) {
    let url = `/user/ajax/related/${modelName}/${action}/`;
    if (action === 'edit' && pk) {
        url = `/user/ajax/related/${modelName}/${pk}/edit/`;
    }

    // Add query parameters for auto-selection
    const queryParams = new URLSearchParams();
    for (const [key, value] of Object.entries(params)) {
        if (value) {
            queryParams.append(key, value);
        }
    }
    if (queryParams.toString()) {
        url += '?' + queryParams.toString();
    }

    // Mark that we're opening a nested modal
    window.nestedModalOpen = true;
    window.parentFieldName = null; // Will be set based on context

    fetch(url)
        .then(response => response.json())
        .then(data => {
            if (data.html) {
                const currentBody = document.getElementById('modal-body');
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = data.html;
                
                // Store the original modal body
                window.originalModalBody = currentBody.innerHTML;
                
                // Replace with nested modal
                currentBody.innerHTML = data.html;
                
                // Re-initialize the form handlers for the nested modal
                initializeNestedModalHandlers(modelName);
            }
        })
        .catch(error => console.error('Error loading related modal:', error));
}

function initializeNestedModalHandlers(modelName) {
    // Handle form submissions in nested modal
    const form = document.querySelector('#modal-container form');
    if (form) {
        // Store model name for later use
        form.dataset.modelName = modelName;
    }
}

function autoSelectInParent(modelName, itemData) {
    // Map model names to field names
    const fieldMapping = {
        'user': 'manager',
        'branch': 'branch',
        'area': 'total_area',
        'menu': 'parent'
    };

    const fieldName = fieldMapping[modelName];
    if (!fieldName) return;

    const field = document.querySelector(`[name="${fieldName}"]`);
    if (field) {
        // Check if field is a select or multi-select
        if (field.tagName === 'SELECT') {
            // Check if it's a multiple select (M2M)
            if (field.hasAttribute('multiple')) {
                // Add to multi-select
                const option = document.createElement('option');
                option.value = itemData.id;
                option.text = itemData.text;
                option.selected = true;
                field.appendChild(option);
            } else {
                // Set single select
                field.value = itemData.id;
            }
            
            // Trigger change event for any listeners
            field.dispatchEvent(new Event('change', { bubbles: true }));
        } else if (field.tagName === 'INPUT' && field.type === 'checkbox') {
            // For checkbox lists (M2M with CheckboxSelectMultiple)
            const checkbox = document.querySelector(`input[name="${fieldName}"][value="${itemData.id}"]`);
            if (checkbox) {
                checkbox.checked = true;
            }
        }
    }
}

function getFieldValue(fieldName) {
    const field = document.querySelector(`[name="${fieldName}"]`);
    return field ? field.value : null;
}
</script> {% endcomment %}
