<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-gray-900 dark:text-white">Create Purchase Item</h3>
        <button type="button" onclick="document.getElementById('modal-container').classList.add('hidden')" class="text-gray-500 hover:text-gray-700">✕</button>
    </div>

    <form method="post"
          hx-post="{% url 'purchase_item_quick_create' %}"
          hx-target="#modal-body"
          hx-swap="innerHTML"
          class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="flex justify-end gap-3 pt-4 border-t border-gray-200 dark:border-slate-700">
            <button type="button"
                    onclick="document.getElementById('modal-container').classList.add('hidden')"
                    class="px-5 py-3 rounded-xl bg-gray-100 dark:bg-slate-800 text-gray-700 dark:text-slate-200">
                Cancel
            </button>
            <button type="submit"
                    class="px-5 py-3 rounded-xl bg-blue-600 hover:bg-blue-700 text-white font-semibold">
                Save Item
            </button>
        </div>
    </form>
</div>
