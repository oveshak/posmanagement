
        <header id="topHeader" class="flex-shrink-0 px-5 py-3">
            <div class="flex items-center justify-between gap-4">
                <div class="flex items-center gap-3 min-w-0">
                    <button id="toggleSidebar" class="header-btn" title="Toggle sidebar">
                        <i class="fas fa-bars-staggered"></i>
                    </button>

                    <div class="min-w-0">
                        <h1 class="text-base font-semibold leading-tight truncate" style="font-family:'Syne',sans-serif; color:var(--text-main);">
                            {% block page_title %}Dashboard{% endblock %}
                        </h1>
                        <p class="text-xs truncate" style="color:var(--text-muted);">
                            {% block page_subtitle %}Welcome back!{% endblock %}
                        </p>
                    </div>
                </div>

                <div class="flex items-center gap-2 flex-shrink-0">
                    <button id="themeToggle" class="header-btn" title="Toggle theme">
                        <i class="fas fa-moon"></i>
                    </button>

                    <div class="relative">
                        <button id="notificationBtn" class="header-btn relative" title="Notifications">
                            <i class="fas fa-bell"></i>
                            <span class="notif-dot"></span>
                        </button>

                        <div id="notificationMenu" class="hidden popup-dropdown absolute right-0 mt-2 w-72 z-50">
                            <div class="px-4 py-3 border-b" style="border-color:var(--border);">
                                <p class="text-xs font-bold uppercase tracking-widest" style="color:var(--text-muted);">Notifications</p>
                            </div>
                            <div class="p-3">
                                <div class="flex gap-3 items-start p-3 rounded-lg" style="background:var(--surface-alt);">
                                    <div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5" style="background:var(--accent-soft);">
                                        <i class="fas fa-check text-xs" style="color:var(--accent);"></i>
                                    </div>
                                    <div>
                                        <p class="text-sm font-medium" style="color:var(--text-main);">All caught up!</p>
                                        <p class="text-xs mt-0.5" style="color:var(--text-muted);">No new notifications right now.</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="relative">
                        <button id="profileBtn" class="flex items-center gap-2 px-2.5 py-1.5 rounded-xl border cursor-pointer transition-all duration-200"
                                style="background:var(--surface-alt); border-color:var(--border); color:var(--text-muted);">
                            <div class="avatar-circle">
                                <span>AD</span>
                            </div>
                            <span class="hidden sm:block text-xs font-medium" style="color:var(--text-main);">Account</span>
                            <i class="fas fa-chevron-down text-xs"></i>
                        </button>

                        <div id="profileMenu" class="hidden popup-dropdown absolute right-0 mt-2 w-48 z-50 overflow-hidden">
                            <div class="px-4 pt-3 pb-2 border-b" style="border-color:var(--border);">
                                <p class="text-xs font-semibold" style="color:var(--text-main);">{{ request.user.username }}</p>
                                <p class="text-xs" style="color:var(--text-muted);">{{ request.user.email }}</p>
                            </div>
                            <div class="py-1">
                                <a href="{% url 'user:profile_page' %}"
   hx-get="{% url 'user:profile_page' %}"
   hx-target="#main-content"
   hx-swap="innerHTML"
   hx-push-url="true"
   hidden
          
            class="dropdown-item flex items-center gap-2">
                                    <i class="fas fa-user-circle w-3.5 text-center"></i> Profile
                                </a>
                                <a href="#" class="dropdown-item flex items-center gap-2">
                                    <i class="fas fa-cog w-3.5 text-center"></i> Settings
                                </a>
                                <div class="border-t my-1" style="border-color:var(--border);"></div>
                                <a href="{% url 'user:logout' %}" class="dropdown-item danger flex items-center gap-2">
                                    <i class="fas fa-arrow-right-from-bracket w-3.5 text-center"></i> Logout
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
