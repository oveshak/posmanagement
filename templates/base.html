



{% load static %}
<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <title>{% block title %}Management{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Syne', 'sans-serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <link rel="stylesheet" href="{% static 'css/navbar.css' %}" />

    {% block extra_css %}{% endblock %}
</head>
<body data-app-prefix="{% block app_prefix %}/user{% endblock %}">
<div class="flex h-screen overflow-hidden">

    {% include 'common/sidebar.html' %}

    <div id="mainContent" class="flex-1 flex flex-col min-w-0 overflow-hidden">

        {% include 'common/header.html' %}
        <main id="main-shell" class="flex-1 overflow-y-auto p-5 sm:p-6 page-content" style="background:var(--surface-alt);">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<div id="sidebarOverlay" class="hidden fixed inset-0 z-30"></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>




<script src="{% static 'js/navbar.js' %}"></script>



<div id="modal-container" class="fixed inset-0 z-[100] hidden">
    <div id="modal-backdrop" class="absolute inset-0 bg-black/50 backdrop-blur-sm"></div>

    <div class="relative z-[101] flex min-h-screen items-center justify-center px-3 py-6">
        <div id="modal-content"
             class="w-full max-w-4xl rounded-2xl bg-white dark:bg-slate-900 shadow-2xl border border-gray-200 dark:border-slate-800 overflow-hidden">
            <div id="modal-body"></div>
        </div>
    </div>
</div>

<script src="{% static 'js/modal-system.js' %}"></script>
<script src="{% static 'js/product-form-page.js' %}"></script>

<script>


    function refreshMainContent() {
    const mainContent = document.getElementById("main-content");
    if (!mainContent) {
        window.location.reload();
        return;
    }

    const url = window.location.href;
    htmx.ajax("GET", url, {
        target: "#main-content",
        swap: "outerHTML"
    });
}


</script>
{% block extra_js %}{% endblock %}
</body>
</html>
