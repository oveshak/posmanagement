



{% load static %}
<!doctype html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8" />
    <title>{% block title %}Management{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Syne', 'sans-serif'],
                        body: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                },
            },
        };
    </script>

    <link rel="stylesheet" href="{% static 'css/navbar.css' %}" />

    {% block extra_css %}{% endblock %}
</head>
<body class="h-full">
<div class="flex h-screen overflow-hidden">

    {% include 'common/sidebar.html' %}

    <div id="mainContent" class="flex-1 flex flex-col min-w-0 overflow-hidden">

        {% include 'common/header.html' %}
        <main id="main-content" class="flex-1 overflow-y-auto p-5 sm:p-6 page-content" style="background:var(--surface-alt);">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<div id="sidebarOverlay" class="hidden fixed inset-0 z-30"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="{% static 'js/simple_alerts.js' %}"></script>
<script src="{% static 'js/modal-handlers.js' %}"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>




<script src="{% static 'js/navbar.js' %}"></script>



{% block extra_js %}{% endblock %}
</body>
</html>
